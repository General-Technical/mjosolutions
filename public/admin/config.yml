backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

site_url: https://mjosolutions.netlify.app/
display_url: https://mjosolutions.netlify.app/
logo_url: https://mjosolutions.netlify.app/MJO_IconLogo.jpg

media_folder: static/img
public_folder: /img

collections:
  - label: "About Page"
    name: "about"
    files:
      - label: "Intro"
        name: "intro"
        file: "/content/pages/about/intro.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Header, name: header, widget: string }
          - { label: Intro1, name: intro1, widget: string }
          - { label: Intro2, name: intro1, widget: string }
      - label: "Solutions"
        name: "solutions"
        file: "/content/pages/about/solutions.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Header, name: header, widget: string }
          - { label: Sol1, name: sol1, widget: string }
          - { label: Sol2, name: sol2, widget: string }
          - { label: Sol3, name: sol3, widget: string }
          - { label: Sol4, name: sol4, widget: string }
          - { label: Sol5, name: sol5, widget: string }
      - label: "What"
      - label: "What"
      - label: "What"
      - label: "What"
        name: "what"
        file: "/content/pages/about/what.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Header, name: header, widget: string }
          - { label: Body, name: body, widget: markdown }
      - label: "Where"
        name: "where"
        file: "/content/pages/about/where.md"
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Header, name: header, widget: string }
          - { label: Body, name: body, widget: markdown }
